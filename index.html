<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>ポカヨケ検査アプリ</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      touch-action: none;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      font-family: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
    }

    h1 {
      font-size: 24px;
      padding: 12px 16px;
      background: #222;
      border-bottom: 2px solid #444;
      text-align: center;
      flex-shrink: 0;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
      overflow: hidden;
    }

    .top-info {
      background: #222;
      padding: 12px 16px;
      font-size: 14px;
      text-align: center;
      border-bottom: 1px solid #444;
      flex-shrink: 0;
    }

    .score-display {
      font-size: 18px;
      font-weight: bold;
      color: #ffff00;
      line-height: 1.3;
    }

    .threshold-display {
      font-size: 14px;
      color: #aaa;
      margin-top: 4px;
    }

    .inspection-result {
      font-size: 14px;
      color: #00ff00;
      margin-top: 6px;
      line-height: 1.4;
    }

    .inspection-result.ng {
      color: #ff6666;
    }

    .video-container {
      position: relative;
      flex: 1;
      background: #000;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: none;
      -webkit-touch-callout: none;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      -webkit-user-select: none;
      user-select: none;
      touch-action: none;
    }

    #videoCanvas {
      position: absolute;
      top: 0;
      left: 0;
      touch-action: none;
    }

    #selectionCanvas {
      position: absolute;
      top: 0;
      left: 0;
      cursor: crosshair;
      display: none;
      touch-action: none;
    }

    #selectionCanvas.active {
      display: block;
    }

    .result-overlay {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120px;
      font-weight: bold;
      text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.8);
      z-index: 100;
      pointer-events: none;
      display: none;
    }

    .result-overlay.ok {
      color: #00ff00;
      display: block;
      animation: pulse 0.5s ease-out;
    }

    .result-overlay.ng {
      color: #ff0000;
      display: block;
      animation: pulse 0.5s ease-out;
    }

    @keyframes pulse {
      0% {
        transform: translate(-50%, -50%) scale(0.8);
        opacity: 0;
      }
      50% {
        transform: translate(-50%, -50%) scale(1.1);
      }
      100% {
        transform: translate(-50%, -50%) scale(1);
        opacity: 1;
      }
    }

    @keyframes blink {
      0%, 50% {
        opacity: 1;
      }
      51%, 100% {
        opacity: 0.3;
      }
    }

    .status-message {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 12px;
      z-index: 50;
      max-width: 200px;
      pointer-events: none;
    }

    .status-message.info {
      background: rgba(100, 150, 255, 0.7);
    }

    .status-message.error {
      background: rgba(255, 100, 100, 0.7);
      color: #ffcccc;
    }

    .status-message.success {
      background: rgba(100, 200, 100, 0.7);
      color: #ccffcc;
    }

    .progress-display {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 32px;
      font-weight: bold;
      color: #ffff00;
      text-shadow: 2px 2px 8px rgba(0, 0, 0, 0.8);
      z-index: 40;
      pointer-events: none;
      display: none;
      background: rgba(0, 0, 0, 0.5);
      padding: 16px 24px;
      border-radius: 8px;
    }

    .progress-display.show {
      display: block;
    }

    .controls {
      background: #111;
      padding: 12px;
      border-top: 2px solid #444;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      align-items: center;
      overflow-y: auto;
      max-height: 200px;
      flex-shrink: 0;
    }

    .threshold-control {
      background: #222;
      padding: 12px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      gap: 8px;
      order: -1;
      width: 100%;
      justify-content: center;
      flex-shrink: 0;
    }

    .threshold-label {
      font-size: 14px;
      font-weight: 600;
      color: #ffff00;
      min-width: 80px;
      text-align: center;
    }

    .threshold-button {
      background: #ff9800;
      color: #fff;
      border: none;
      padding: 16px 20px;
      font-size: 18px;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
      -webkit-user-select: none;
      user-select: none;
      min-width: 50px;
      flex-shrink: 0;
    }

    .threshold-button:active {
      background: #e68900;
    }

    .threshold-slider-wrapper {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .threshold-slider-wrapper input[type="range"] {
      width: 100px;
      height: 24px;
      cursor: pointer;
    }

    .threshold-value {
      font-size: 12px;
      color: #ffff00;
      min-width: 35px;
      text-align: right;
      font-weight: bold;
    }

    button {
      background: #0a66ff;
      color: #fff;
      border: none;
      padding: 12px 16px;
      font-size: 14px;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.2s;
      -webkit-user-select: none;
      user-select: none;
    }

    button:active {
      background: #0847cc;
    }

    button:disabled {
      background: #666;
      cursor: not-allowed;
      opacity: 0.6;
    }

    button.primary {
      background: #0a66ff;
    }

    button.success {
      background: #10a960;
    }

    button.success:active {
      background: #089050;
    }

    button.warning {
      background: #ff9800;
    }

    button.warning:active {
      background: #e68900;
    }

    button.danger {
      background: #ff4444;
    }

    button.danger:active {
      background: #dd0000;
    }

    button.info {
      background: #4a90e2;
    }

    button.info:active {
      background: #3a7cd2;
    }

    #error {
      position: absolute;
      bottom: 10px;
      left: 10px;
      right: 10px;
      background: rgba(200, 0, 0, 0.9);
      color: #ffcccc;
      padding: 12px;
      border-radius: 4px;
      font-size: 12px;
      z-index: 50;
      white-space: pre-wrap;
      word-break: break-word;
      max-height: 120px;
      overflow-y: auto;
      display: none;
      pointer-events: none;
    }

    #error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ポカヨケ検査アプリ</h1>

    <div class="top-info">
      <div class="score-display">
        スコア: <span id="scoreValue">-</span>
        <div id="scoreDetails" style="font-size: 12px; color: #aaa; margin-top: 4px; display: none;"></div>
      </div>
      <div class="inspection-result" id="inspectionResult"></div>
      <div class="threshold-display">
        しきい値: <span id="thresholdValue">20</span>
      </div>
    </div>

    <div class="video-container" id="videoContainer">
      <video
        id="video"
        playsinline
        autoplay
        muted
        webkit-playsinline="true"
      ></video>
      <canvas id="videoCanvas"></canvas>
      <canvas id="selectionCanvas"></canvas>
      <div id="progressDisplay" class="progress-display"></div>
      <div id="resultOverlay" class="result-overlay"></div>
      <div id="statusMessage" class="status-message"></div>
      <div id="error"></div>
    </div>

    <div class="controls">
      <div class="threshold-control">
        <button id="thresholdMinus" class="threshold-button">−</button>
        <div class="threshold-label">しきい値: <span id="thresholdValueControl">20</span></div>
        <button id="thresholdPlus" class="threshold-button">+</button>
        <div class="threshold-slider-wrapper">
          <input
            id="thresholdSlider"
            type="range"
            min="0"
            max="100"
            value="20"
            disabled
          />
          <span class="threshold-value" id="thresholdValueSlider">20</span>
        </div>
      </div>

      <button id="cameraButton" class="primary">カメラ開始 / 切替</button>
      <button id="rangeSelectButton" class="primary" disabled>範囲選択</button>
      <button id="createFixedRangeButton" class="info" disabled>中央に検査枠を作成</button>
      <button id="saveOkButton" class="success" disabled>OK基準保存</button>
      <button id="inspectButton" class="warning" disabled>検査開始</button>
      <button id="resetButton" class="danger" disabled>リセット</button>
      <button id="statusCheckButton" class="primary">状態確認</button>
    </div>
  </div>

  <script>
    (function () {
      // ========== DOM要素 ==========
      const videoContainer = document.getElementById('videoContainer');
      const video = document.getElementById('video');
      const videoCanvas = document.getElementById('videoCanvas');
      const videoCtx = videoCanvas.getContext('2d', { willReadFrequently: true });
      const selectionCanvas = document.getElementById('selectionCanvas');
      const selectionCtx = selectionCanvas.getContext('2d', { willReadFrequently: true });
      const cameraButton = document.getElementById('cameraButton');
      const rangeSelectButton = document.getElementById('rangeSelectButton');
      const createFixedRangeButton = document.getElementById('createFixedRangeButton');
      const saveOkButton = document.getElementById('saveOkButton');
      const inspectButton = document.getElementById('inspectButton');
      const resetButton = document.getElementById('resetButton');
      const statusCheckButton = document.getElementById('statusCheckButton');
      const thresholdSlider = document.getElementById('thresholdSlider');
      const thresholdMinus = document.getElementById('thresholdMinus');
      const thresholdPlus = document.getElementById('thresholdPlus');
      const thresholdValue = document.getElementById('thresholdValue');
      const thresholdValueControl = document.getElementById('thresholdValueControl');
      const thresholdValueSlider = document.getElementById('thresholdValueSlider');
      const scoreValue = document.getElementById('scoreValue');
      const scoreDetails = document.getElementById('scoreDetails');
      const inspectionResult = document.getElementById('inspectionResult');
      const progressDisplay = document.getElementById('progressDisplay');
      const statusMessage = document.getElementById('statusMessage');
      const errorDiv = document.getElementById('error');
      const resultOverlay = document.getElementById('resultOverlay');

      // ========== 状態変数 ==========
      let currentStream = null;
      let isRangeSelecting = false;
      let selectionStart = null;
      let selectionEnd = null;
      let selectedRange = null; // { x, y, width, height }
      let okReferenceImageData = null;
      let okReferenceHSV = null; // OK基準のHSV統計
      let lastScore = null;
      let lastNgCount = null;
      let cameraWidth = 0;
      let cameraHeight = 0;
      let isProcessing = false;
      let isInspecting = false;

      const FRAME_COUNT = 15;
      const FRAME_INTERVAL = 150; // 0.15秒

      // ========== ユーティリティ関数 ==========

      function stopCurrentStream() {
        if (currentStream) {
          try {
            currentStream.getTracks().forEach(track => {
              try {
                track.stop();
              } catch (e) {
                console.warn('track.stop error', e);
              }
            });
          } catch (e) {
            console.warn('stopCurrentStream error', e);
          }
          currentStream = null;
        }
      }

      function showStatus(message, type = 'info') {
        statusMessage.textContent = message;
        statusMessage.className = 'status-message ' + type;
        setTimeout(() => {
          if (statusMessage.textContent === message) {
            statusMessage.className = 'status-message';
            statusMessage.textContent = '';
          }
        }, 3000);
      }

      function showError(message) {
        errorDiv.textContent = message;
        errorDiv.classList.add('show');
        console.error(message);
      }

      function clearError() {
        errorDiv.textContent = '';
        errorDiv.classList.remove('show');
      }

      function showResult(isOk) {
        resultOverlay.textContent = isOk ? 'OK' : 'NG';
        resultOverlay.className = 'result-overlay ' + (isOk ? 'ok' : 'ng');
        setTimeout(() => {
          resultOverlay.className = 'result-overlay';
        }, 2000);
      }

      function showProgress(current, total, type = '検査中') {
        progressDisplay.textContent = `${type} ${current}/${total}`;
        progressDisplay.classList.add('show');
      }

      function hideProgress() {
        progressDisplay.classList.remove('show');
      }

      function updateThresholdDisplay() {
        const value = parseInt(thresholdSlider.value, 10);
        thresholdValue.textContent = value;
        thresholdValueControl.textContent = value;
        thresholdValueSlider.textContent = value;
      }

      function updateButtonStates() {
        const hasCameraStream = currentStream !== null;
        const hasSelectedRange = selectedRange !== null;
        const hasOkReference = okReferenceImageData !== null;

        rangeSelectButton.disabled = !hasCameraStream;
        createFixedRangeButton.disabled = !hasCameraStream;
        saveOkButton.disabled = !hasSelectedRange || !hasCameraStream || isProcessing;
        inspectButton.disabled = !hasSelectedRange || !hasOkReference || !hasCameraStream || isProcessing;
        thresholdSlider.disabled = !hasOkReference;
        resetButton.disabled = !hasSelectedRange && !hasOkReference;
      }

      // ========== RGB to HSV 変換 ==========

      function rgbToHsv(r, g, b) {
        r /= 255;
        g /= 255;
        b /= 255;

        const max = Math.max(r, g, b);
        const min = Math.min(r, g, b);
        const delta = max - min;

        let h = 0;
        let s = max === 0 ? 0 : delta / max;
        let v = max;

        if (delta !== 0) {
          if (max === r) {
            h = 60 * (((g - b) / delta) % 6);
          } else if (max === g) {
            h = 60 * ((b - r) / delta + 2);
          } else {
            h = 60 * ((r - g) / delta + 4);
          }
        }

        if (h < 0) h += 360;

        return { h, s, v };
      }

      // ========== 画像のHSV統計を計算 ==========

      function calculateImageHSVStats(imageData) {
        const data = imageData.data;
        let totalH = 0, totalS = 0, totalV = 0;
        let hsvCount = 0;
        let redCount = 0; // 赤色（h: 0-30 or 330-360）
        let count = 0;

        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];

          // グレースケール（明度が低い）は除外
          const gray = (r + g + b) / 3;
          if (gray < 20) continue;

          const hsv = rgbToHsv(r, g, b);
          totalH += hsv.h;
          totalS += hsv.s;
          totalV += hsv.v;
          count++;

          // 赤色判定（色相が0-30 or 330-360）
          if (hsv.h <= 30 || hsv.h >= 330) {
            redCount++;
          }
        }

        if (count === 0) {
          return { h: 0, s: 0, v: 0, redRate: 0 };
        }

        return {
          h: totalH / count,
          s: totalS / count,
          v: totalV / count,
          redRate: (redCount / count) * 100
        };
      }

      // ========== 色差分スコア計算 ==========

      function calculateColorDifference(r1, g1, b1, r2, g2, b2) {
        // RGB差分
        const rgbDiff = (Math.abs(r1 - r2) + Math.abs(g1 - g2) + Math.abs(b1 - b2)) / 3;

        // HSV変換
        const hsv1 = rgbToHsv(r1, g1, b1);
        const hsv2 = rgbToHsv(r2, g2, b2);

        // 色相差分（0-180の範囲に正規化）
        let hDiff = Math.abs(hsv1.h - hsv2.h);
        if (hDiff > 180) hDiff = 360 - hDiff;
        hDiff = hDiff / 180 * 255; // 0-255の範囲に変換

        // 彩度差分
        const sDiff = Math.abs(hsv1.s - hsv2.s) * 255;

        // 明度差分
        const vDiff = Math.abs(hsv1.v - hsv2.v) * 255;

        // 複合スコア：色相を強く重視（0.5倍）、彩度と明度は弱く（0.25倍）
        const colorScore = (hDiff * 0.5 + sDiff * 0.25 + vDiff * 0.25) / 3;

        // RGB + Color複合スコア
        const totalScore = (rgbDiff * 0.4 + colorScore * 0.6);

        return totalScore;
      }

      // ========== 画像処理：グレースケール化とぼかし ==========

      function applyImageProcessing(imageData) {
        const data = imageData.data;
        const width = imageData.width;
        const height = imageData.height;

        // ステップ1: グレースケール化
        const grayscaleData = new Uint8ClampedArray(data.length);
        for (let i = 0; i < data.length; i += 4) {
          const r = data[i];
          const g = data[i + 1];
          const b = data[i + 2];
          const a = data[i + 3];

          const gray = Math.round(0.299 * r + 0.587 * g + 0.114 * b);

          grayscaleData[i] = gray;
          grayscaleData[i + 1] = gray;
          grayscaleData[i + 2] = gray;
          grayscaleData[i + 3] = a;
        }

        // ステップ2: ぼかし処理（3x3 ガウシアンフィルタ）
        const blurredData = new Uint8ClampedArray(grayscaleData.length);
        const kernel = [
          1, 2, 1,
          2, 4, 2,
          1, 2, 1
        ];
        const kernelSum = 16;

        for (let y = 1; y < height - 1; y++) {
          for (let x = 1; x < width - 1; x++) {
            let r = 0, g = 0, b = 0, a = 255;
            let ki = 0;

            for (let dy = -1; dy <= 1; dy++) {
              for (let dx = -1; dx <= 1; dx++) {
                const idx = ((y + dy) * width + (x + dx)) * 4;
                r += grayscaleData[idx] * kernel[ki];
                g += grayscaleData[idx + 1] * kernel[ki];
                b += grayscaleData[idx + 2] * kernel[ki];
                ki++;
              }
            }

            const idx = (y * width + x) * 4;
            blurredData[idx] = Math.round(r / kernelSum);
            blurredData[idx + 1] = Math.round(g / kernelSum);
            blurredData[idx + 2] = Math.round(b / kernelSum);
            blurredData[idx + 3] = a;
          }
        }

        // 端のピクセルをコピー
        for (let i = 0; i < width; i++) {
          const topIdx = i * 4;
          const bottomIdx = ((height - 1) * width + i) * 4;
          blurredData[topIdx] = grayscaleData[topIdx];
          blurredData[topIdx + 1] = grayscaleData[topIdx + 1];
          blurredData[topIdx + 2] = grayscaleData[topIdx + 2];
          blurredData[topIdx + 3] = grayscaleData[topIdx + 3];
          blurredData[bottomIdx] = grayscaleData[bottomIdx];
          blurredData[bottomIdx + 1] = grayscaleData[bottomIdx + 1];
          blurredData[bottomIdx + 2] = grayscaleData[bottomIdx + 2];
          blurredData[bottomIdx + 3] = grayscaleData[bottomIdx + 3];
        }

        for (let y = 1; y < height - 1; y++) {
          const leftIdx = (y * width) * 4;
          const rightIdx = (y * width + (width - 1)) * 4;
          blurredData[leftIdx] = grayscaleData[leftIdx];
          blurredData[leftIdx + 1] = grayscaleData[leftIdx + 1];
          blurredData[leftIdx + 2] = grayscaleData[leftIdx + 2];
          blurredData[leftIdx + 3] = grayscaleData[leftIdx + 3];
          blurredData[rightIdx] = grayscaleData[rightIdx];
          blurredData[rightIdx + 1] = grayscaleData[rightIdx + 1];
          blurredData[rightIdx + 2] = grayscaleData[rightIdx + 2];
          blurredData[rightIdx + 3] = grayscaleData[rightIdx + 3];
        }

        return new ImageData(blurredData, width, height);
      }

      // ========== フレーム取得と処理 ==========

      function captureFrameData() {
        if (!selectedRange || cameraWidth === 0 || cameraHeight === 0) {
          return null;
        }

        try {
          const tempCanvas = document.createElement('canvas');
          tempCanvas.width = cameraWidth;
          tempCanvas.height = cameraHeight;
          const tempCtx = tempCanvas.getContext('2d');
          tempCtx.drawImage(video, 0, 0);

          const rawImageData = tempCtx.getImageData(
            selectedRange.x,
            selectedRange.y,
            selectedRange.width,
            selectedRange.height
          );

          return applyImageProcessing(rawImageData);
        } catch (e) {
          console.error('フレーム取得エラー:', e);
          return null;
        }
      }

      // ========== 画像平均化 ==========

      function averageImageData(imageDataArray) {
        if (!imageDataArray || imageDataArray.length === 0) {
          return null;
        }

        const first = imageDataArray[0];
        const count = imageDataArray.length;
        const averagedData = new Uint8ClampedArray(first.data.length);

        for (let i = 0; i < first.data.length; i += 4) {
          let r = 0, g = 0, b = 0, a = 255;

          for (let j = 0; j < count; j++) {
            r += imageDataArray[j].data[i];
            g += imageDataArray[j].data[i + 1];
            b += imageDataArray[j].data[i + 2];
          }

          averagedData[i] = Math.round(r / count);
          averagedData[i + 1] = Math.round(g / count);
          averagedData[i + 2] = Math.round(b / count);
          averagedData[i + 3] = a;
        }

        return new ImageData(averagedData, first.width, first.height);
      }

      // ========== スコア計算 ==========

      function calculateDifferenceScore(referenceImageData, currentImageData) {
        if (!referenceImageData || !currentImageData) {
          return null;
        }

        try {
          const refData = referenceImageData.data;
          const curData = currentImageData.data;

          let totalDifference = 0;
          const pixelCount = refData.length / 4;

          for (let i = 0; i < refData.length; i += 4) {
            const r1 = refData[i];
            const g1 = refData[i + 1];
            const b1 = refData[i + 2];

            const r2 = curData[i];
            const g2 = curData[i + 1];
            const b2 = curData[i + 2];

            // 色差分スコア計算（RGB + HSV複合）
            const colorDiff = calculateColorDifference(r1, g1, b1, r2, g2, b2);
            totalDifference += colorDiff;
          }

          // 0-100 のスコアに正規化
          const score = Math.min(100, Math.round((totalDifference / pixelCount) * 100 / 255));
          return score;
        } catch (e) {
          console.error('スコア計算エラー:', e);
          return null;
        }
      }

      // ========== 強化版判定ロジック ==========

      function performEnhancedJudgment(scores, currentImageData) {
        const threshold = parseInt(thresholdSlider.value, 10);
        
        // スコア統計
        const avgScore = Math.round(scores.reduce((a, b) => a + b, 0) / scores.length);
        const maxScore = Math.max(...scores);
        const ngCount = scores.filter(s => s > threshold).length;
        
        // 色差分率（OK基準と異なる色の割合）
        const currentHSV = calculateImageHSVStats(currentImageData);
        const okHSV = okReferenceHSV;
        
        // 赤色率の差分
        const redRateDiff = Math.abs(currentHSV.redRate - okHSV.redRate);
        
        // 彩度の差分
        const saturationDiff = Math.abs(currentHSV.s - okHSV.s);
        
        // 色相の差分（赤色域での判定）
        let hueDiff = Math.abs(currentHSV.h - okHSV.h);
        if (hueDiff > 180) hueDiff = 360 - hueDiff;
        
        // 色違い率（OK基準と異なる色が多い場合）
        const colorDifferenceRate = redRateDiff; // %単位

        // ========== 判定条件（どれか1つでも当てはまればNG）==========
        let judgment = 'OK';
        let reasons = [];

        // 1. 平均スコア > しきい値
        if (avgScore > threshold) {
          judgment = 'NG';
          reasons.push(`平均スコア(${avgScore}) > しきい値(${threshold})`);
        }

        // 2. 15枚中3枚以上がNG
        if (ngCount >= 3) {
          judgment = 'NG';
          reasons.push(`NG枚数(${ngCount}) >= 3`);
        }

        // 3. 最大スコア >= しきい値+10
        if (maxScore >= threshold + 10) {
          judgment = 'NG';
          reasons.push(`最大スコア(${maxScore}) >= ${threshold + 10}`);
        }

        // 4. 色違い率が20%以上
        if (colorDifferenceRate >= 20) {
          judgment = 'NG';
          reasons.push(`色違い率(${colorDifferenceRate.toFixed(1)}%) >= 20%`);
        }

        // 5. 赤色率または彩度がOK基準と大きく違う
        // 赤色が大きく減った（銀色に変わった）場合NG
        if (currentHSV.redRate < okHSV.redRate - 30) {
          judgment = 'NG';
          reasons.push(`赤色率が低下(OK:${okHSV.redRate.toFixed(1)}% → 現在:${currentHSV.redRate.toFixed(1)}%)`);
        }

        // 彩度が大きく低下（銀色ビール化）場合NG
        if (saturationDiff > 0.35) {
          judgment = 'NG';
          reasons.push(`彩度が大きく異なる(差分:${saturationDiff.toFixed(3)})`);
        }

        return {
          judgment,
          avgScore,
          maxScore,
          ngCount,
          colorDifferenceRate,
          reasons,
          stats: {
            avgScore,
            maxScore,
            ngCount,
            colorDifferenceRate: colorDifferenceRate.toFixed(1),
            currentRedRate: currentHSV.redRate.toFixed(1),
            okRedRate: okHSV.redRate.toFixed(1),
            currentSaturation: currentHSV.s.toFixed(3),
            okSaturation: okHSV.s.toFixed(3)
          }
        };
      }

      // ========== スコア表示を更新 ==========

      function updateScoreDisplay(result) {
        scoreValue.textContent = result.avgScore;
        
        // 詳細表示
        const detailsHTML = `
          平均: ${result.stats.avgScore} | 最大: ${result.stats.maxScore} | 
          NG枚数: ${result.stats.ngCount}/15 | 色違い率: ${result.stats.colorDifferenceRate}%<br>
          赤率: ${result.stats.currentRedRate}% | 彩度: ${result.stats.currentSaturation}
        `;
        scoreDetails.innerHTML = detailsHTML;
        scoreDetails.style.display = 'block';

        // 判定結果を表示
        if (result.reasons.length > 0) {
          inspectionResult.textContent = result.reasons.join(' / ');
          inspectionResult.classList.add('ng');
        } else {
          inspectionResult.textContent = 'OK';
          inspectionResult.classList.remove('ng');
        }
      }

      // ========== 検査範囲の描画（オーバーレイ）==========

      function drawRangeOverlay(drawingCtx, isInspecting = false) {
        if (!selectedRange || cameraWidth === 0 || cameraHeight === 0) {
          return;
        }

        // キャンバスサイズをビデオサイズに合わせる
        const rect = video.getBoundingClientRect();
        const scaleX = cameraWidth / video.videoWidth;
        const scaleY = cameraHeight / video.videoHeight;

        const displayX = selectedRange.x / scaleX;
        const displayY = selectedRange.y / scaleY;
        const displayWidth = selectedRange.width / scaleX;
        const displayHeight = selectedRange.height / scaleY;

        // 背景をクリア
        drawingCtx.clearRect(0, 0, videoCanvas.width, videoCanvas.height);

        // 選択範囲外を暗くする
        drawingCtx.fillStyle = 'rgba(0, 0, 0, 0.6)';
        
        // 上
        drawingCtx.fillRect(0, 0, videoCanvas.width, displayY);
        
        // 下
        drawingCtx.fillRect(0, displayY + displayHeight, videoCanvas.width, videoCanvas.height - (displayY + displayHeight));
        
        // 左
        drawingCtx.fillRect(0, displayY, displayX, displayHeight);
        
        // 右
        drawingCtx.fillRect(displayX + displayWidth, displayY, videoCanvas.width - (displayX + displayWidth), displayHeight);

        // 検査範囲の枠を描画
        if (isInspecting) {
          // 検査中：太い枠
          drawingCtx.strokeStyle = '#ffff00';
          drawingCtx.lineWidth = 6;
          drawingCtx.setLineDash([]);
          drawingCtx.strokeRect(displayX, displayY, displayWidth, displayHeight);

          // テキスト：「検査中」「検査範囲」
          drawingCtx.fillStyle = '#ffff00';
          drawingCtx.font = 'bold 18px sans-serif';
          drawingCtx.textAlign = 'center';
          drawingCtx.shadowColor = 'rgba(0, 0, 0, 0.8)';
          drawingCtx.shadowBlur = 4;
          drawingCtx.shadowOffsetX = 0;
          drawingCtx.shadowOffsetY = 0;

          // 上部に「検査中」
          drawingCtx.fillText('検査中', displayX + displayWidth / 2, displayY - 30);
          
          // 下部に「検査範囲」
          drawingCtx.fillText('検査範囲', displayX + displayWidth / 2, displayY + displayHeight + 35);
        } else {
          // 通常：普通の枠
          drawingCtx.strokeStyle = '#ffff00';
          drawingCtx.lineWidth = 4;
          drawingCtx.setLineDash([]);
          drawingCtx.strokeRect(displayX, displayY, displayWidth, displayHeight);
        }
      }

      // ========== 描画ループ ==========

      function startDrawingLoop() {
        function draw() {
          if (cameraWidth === 0 || cameraHeight === 0) {
            requestAnimationFrame(draw);
            return;
          }

          // videoCanvasのサイズを更新
          const rect = video.getBoundingClientRect();
          videoCanvas.width = rect.width;
          videoCanvas.height = rect.height;

          drawRangeOverlay(videoCtx, isInspecting);

          requestAnimationFrame(draw);
        }
        draw();
      }

      // ========== カメラ起動 ==========

      async function startCameraWithConstraints(constraints) {
        try {
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          stopCurrentStream();
          currentStream = stream;
          video.srcObject = stream;

          try {
            await video.play();
          } catch (playError) {
            console.warn('video.play() failed:', playError);
          }

          video.addEventListener(
            'loadedmetadata',
            () => {
              cameraWidth = video.videoWidth;
              cameraHeight = video.videoHeight;
              selectionCanvas.width = cameraWidth;
              selectionCanvas.height = cameraHeight;
              console.log(`Video loaded: ${cameraWidth}x${cameraHeight}`);
              startDrawingLoop();
            },
            { once: true }
          );

          return stream;
        } catch (err) {
          throw err;
        }
      }

      cameraButton.addEventListener('click', async () => {
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          showError('このブラウザはカメラ API をサポートしていません。');
          return;
        }

        showStatus('カメラ起動中...', 'info');
        clearError();
        stopCurrentStream();

        const envConstraints = {
          video: { facingMode: { ideal: 'environment' } },
          audio: false
        };
        const userConstraints = {
          video: { facingMode: { ideal: 'user' } },
          audio: false
        };

        try {
          await startCameraWithConstraints(envConstraints);
          showStatus('カメラ起動成功（背面）', 'success');
          console.log('カメラ起動成功（背面）');
          updateButtonStates();
          clearError();
        } catch (errEnv) {
          console.warn('背面カメラで失敗:', errEnv);
          try {
            console.log('前面カメラで再試行');
            await startCameraWithConstraints(userConstraints);
            showStatus('カメラ起動成功（前面）', 'success');
            console.log('カメラ起動成功（前面）');
            updateButtonStates();
            clearError();
          } catch (errUser) {
            console.error('前面カメラでの再試行も失敗:', errUser);
            let message = 'カメラの起動に失敗しました。\n';
            if (errUser && errUser.name) {
              message += `エラー: ${errUser.name}\n`;
            }
            if (errUser && errUser.message) {
              message += `詳細: ${errUser.message}`;
            }
            showError(message);
            updateButtonStates();
          }
        }
      });

      // ========== 範囲選択機能 ==========

      function drawSelectionGuide() {
        selectionCtx.clearRect(0, 0, selectionCanvas.width, selectionCanvas.height);

        if (isRangeSelecting && selectionStart && selectionEnd) {
          // 選択中の範囲を緑の点線で描画
          const x = Math.min(selectionStart.x, selectionEnd.x);
          const y = Math.min(selectionStart.y, selectionEnd.y);
          const width = Math.abs(selectionEnd.x - selectionStart.x);
          const height = Math.abs(selectionEnd.y - selectionStart.y);

          selectionCtx.strokeStyle = '#00ff00';
          selectionCtx.lineWidth = 3;
          selectionCtx.setLineDash([8, 4]);
          selectionCtx.strokeRect(x, y, width, height);
          selectionCtx.setLineDash([]);

          selectionCtx.fillStyle = 'rgba(0, 255, 0, 0.08)';
          selectionCtx.fillRect(x, y, width, height);
        }
      }

      function startRangeSelection() {
        isRangeSelecting = true;
        selectionCanvas.classList.add('active');
        selectionStart = null;
        selectionEnd = null;
      }

      function endRangeSelection() {
        isRangeSelecting = false;
        selectionCanvas.classList.remove('active');

        if (selectionStart && selectionEnd) {
          const x = Math.min(selectionStart.x, selectionEnd.x);
          const y = Math.min(selectionStart.y, selectionEnd.y);
          const width = Math.abs(selectionEnd.x - selectionStart.x);
          const height = Math.abs(selectionEnd.y - selectionStart.y);

          if (width > 0 && height > 0) {
            selectedRange = { x, y, width, height };
            showStatus('範囲選択完了', 'success');
            updateButtonStates();
          }
        }

        selectionCtx.clearRect(0, 0, selectionCanvas.width, selectionCanvas.height);
        selectionStart = null;
        selectionEnd = null;
      }

      selectionCanvas.addEventListener('mousedown', (e) => {
        if (!isRangeSelecting) return;
        const rect = selectionCanvas.getBoundingClientRect();
        selectionStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
      });

      selectionCanvas.addEventListener('mousemove', (e) => {
        if (!isRangeSelecting || !selectionStart) return;
        const rect = selectionCanvas.getBoundingClientRect();
        selectionEnd = { x: e.clientX - rect.left, y: e.clientY - rect.top };
        drawSelectionGuide();
      });

      selectionCanvas.addEventListener('mouseup', () => {
        endRangeSelection();
      });

      selectionCanvas.addEventListener('mouseleave', () => {
        if (isRangeSelecting && selectionStart) {
          endRangeSelection();
        }
      });

      // タッチ対応
      selectionCanvas.addEventListener('touchstart', (e) => {
        if (!isRangeSelecting) return;
        const rect = selectionCanvas.getBoundingClientRect();
        const touch = e.touches[0];
        selectionStart = { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
      });

      selectionCanvas.addEventListener('touchmove', (e) => {
        if (!isRangeSelecting || !selectionStart) return;
        e.preventDefault();
        const rect = selectionCanvas.getBoundingClientRect();
        const touch = e.touches[0];
        selectionEnd = { x: touch.clientX - rect.left, y: touch.clientY - rect.top };
        drawSelectionGuide();
      });

      selectionCanvas.addEventListener('touchend', () => {
        endRangeSelection();
      });

      rangeSelectButton.addEventListener('click', () => {
        startRangeSelection();
        showStatus('範囲を選択してください', 'info');
      });

      // ========== 固定範囲作成 ==========

      createFixedRangeButton.addEventListener('click', () => {
        if (cameraWidth === 0 || cameraHeight === 0) {
          showError('カメラが起動していません');
          return;
        }

        const margin = 50;
        selectedRange = {
          x: margin,
          y: margin,
          width: cameraWidth - margin * 2,
          height: cameraHeight - margin * 2
        };

        showStatus('中央に検査枠を作成しました', 'success');
        updateButtonStates();
      });

      // ========== OK基準保存 ==========

      saveOkButton.addEventListener('click', async () => {
        if (!selectedRange) {
          showError('範囲を選択してください');
          return;
        }

        isProcessing = true;
        updateButtonStates();
        showStatus('OK基準を取得中...', 'info');

        try {
          const frames = [];
          for (let i = 0; i < FRAME_COUNT; i++) {
            const frameData = captureFrameData();
            if (frameData) {
              frames.push(frameData);
            }
            showProgress(i + 1, FRAME_COUNT, 'フレーム取得');
            await new Promise(resolve => setTimeout(resolve, FRAME_INTERVAL));
          }

          if (frames.length === 0) {
            showError('フレーム取得に失敗しました');
            isProcessing = false;
            updateButtonStates();
            hideProgress();
            return;
          }

          const averagedFrame = averageImageData(frames);
          okReferenceImageData = averagedFrame;
          okReferenceHSV = calculateImageHSVStats(averagedFrame);

          hideProgress();
          showStatus('OK基準を保存しました', 'success');
          updateButtonStates();
          console.log('OK基準保存完了', okReferenceHSV);
        } catch (e) {
          showError('OK基準保存エラー: ' + e.message);
          console.error(e);
        } finally {
          isProcessing = false;
          updateButtonStates();
        }
      });

      // ========== 検査開始 ==========

      inspectButton.addEventListener('click', async () => {
        if (!selectedRange || !okReferenceImageData) {
          showError('範囲選択とOK基準保存を完了してください');
          return;
        }

        isProcessing = true;
        isInspecting = true;
        updateButtonStates();
        showStatus('検査中...', 'info');

        try {
          const frames = [];
          for (let i = 0; i < FRAME_COUNT; i++) {
            const frameData = captureFrameData();
            if (frameData) {
              frames.push(frameData);
            }
            showProgress(i + 1, FRAME_COUNT, '検査中');
            await new Promise(resolve => setTimeout(resolve, FRAME_INTERVAL));
          }

          hideProgress();

          if (frames.length === 0) {
            showError('フレーム取得に失敗しました');
            isProcessing = false;
            isInspecting = false;
            updateButtonStates();
            return;
          }

          // スコア計算
          const scores = frames.map(frame => 
            calculateDifferenceScore(okReferenceImageData, frame)
          ).filter(s => s !== null);

          if (scores.length === 0) {
            showError('スコア計算に失敗しました');
            isProcessing = false;
            isInspecting = false;
            updateButtonStates();
            return;
          }

          // 平均化フレームを使用して強化判定を実行
          const averagedFrame = averageImageData(frames);
          const result = performEnhancedJudgment(scores, averagedFrame);

          lastScore = result.avgScore;
          lastNgCount = result.ngCount;

          updateScoreDisplay(result);
          showResult(result.judgment === 'OK');

          console.log('検査結果:', result);

          isProcessing = false;
          isInspecting = false;
          updateButtonStates();
          showStatus(`検査完了: ${result.judgment}`, result.judgment === 'OK' ? 'success' : 'error');
        } catch (e) {
          showError('検査エラー: ' + e.message);
          console.error(e);
          isProcessing = false;
          isInspecting = false;
          updateButtonStates();
        }
      });

      // ========== リセット ==========

      resetButton.addEventListener('click', () => {
        selectedRange = null;
        okReferenceImageData = null;
        okReferenceHSV = null;
        lastScore = null;
        lastNgCount = null;
        scoreValue.textContent = '-';
        scoreDetails.innerHTML = '';
        scoreDetails.style.display = 'none';
        inspectionResult.textContent = '';
        inspectionResult.classList.remove('ng');
        updateButtonStates();
        showStatus('リセットしました', 'success');
      });

      // ========== しきい値制御 ==========

      thresholdSlider.addEventListener('input', updateThresholdDisplay);

      thresholdMinus.addEventListener('click', () => {
        let value = parseInt(thresholdSlider.value, 10);
        value = Math.max(0, value - 1);
        thresholdSlider.value = value;
        updateThresholdDisplay();
      });

      thresholdPlus.addEventListener('click', () => {
        let value = parseInt(thresholdSlider.value, 10);
        value = Math.min(100, value + 1);
        thresholdSlider.value = value;
        updateThresholdDisplay();
      });

      // ========== 状態確認 ==========

      statusCheckButton.addEventListener('click', () => {
        const status = {
          'カメラ': currentStream ? '起動' : '未起動',
          '範囲選択': selectedRange ? 'OK' : '未選択',
          'OK基準': okReferenceImageData ? '保存済' : '未保存',
          'しきい値': parseInt(thresholdSlider.value, 10),
          '最後のスコア': lastScore !== null ? lastScore : '-',
          'NG枚数': lastNgCount !== null ? `${lastNgCount}/15` : '-'
        };

        let message = '状態確認:\n';
        for (const [key, value] of Object.entries(status)) {
          message += `${key}: ${value}\n`;
        }
        showStatus(message, 'info');
        console.log('状態確認:', status);
      });

      // 初期化
      updateButtonStates();
      updateThresholdDisplay();
    })();
  </script>
</body>
</html>

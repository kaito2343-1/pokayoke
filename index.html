<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ポカヨケ検査アプリ</title>
  <style>
    body { font-family: system-ui, -apple-system, "Helvetica Neue", Arial; padding: 16px; }
    #controls { margin-bottom: 12px; }
    button { font-size: 16px; padding: 8px 12px; }
    video { width: 100%; max-width: 640px; background: #000; border: 1px solid #ccc; }
    #status { margin-top: 8px; font-weight: 600; }
    #status .info { color: #333; }
    #status .success { color: green; }
    #status .loading { color: #0a66ff; }
    #error { margin-top: 8px; color: red; font-weight: 700; white-space: pre-wrap; }
    /* 既存のポカヨケ検査UI用スタブ */
    #inspection { margin-top: 20px; padding: 12px; border: 1px dashed #999; }
    .small { font-size: 0.9em; color: #666; }
  </style>
</head>
<body>
  <h1>ポカヨケ検査アプリ</h1>

  <div id="controls">
    <button id="cameraButton" aria-live="polite">カメラ開始 / 切替</button>
  </div>

  <div>
    <!-- iPhone Safari 対応のため playsinline, autoplay, muted を必ず付与 -->
    <video id="video" playsinline autoplay muted></video>
  </div>

  <div id="status" aria-live="polite">
    <span id="statusText" class="info">カメラは未起動です</span>
  </div>
  <div id="error" role="alert" aria-live="assertive"></div>

  <!-- 既存のポカヨケ検査機能（削除しないでここに残す） -->
  <div id="inspection">
    <h2>既存ポカヨケ検査機能</h2>
    <p class="small">ここには既存の検査ロジックや UI が入ります。カメラ起動部分のみを確実に動作させるようにしています。</p>
    <!-- 既存コードのプレースホルダ -->
    <div id="inspectionUI">
      <!-- 既存機能を置き換えないためのサンプル要素 -->
      <button id="dummyInspectBtn">検査を実行</button>
    </div>
  </div>

  <script>
    (function () {
      const cameraButton = document.getElementById('cameraButton');
      const video = document.getElementById('video');
      const statusText = document.getElementById('statusText');
      const errorDiv = document.getElementById('error');

      let currentStream = null;

      // ユーティリティ: 既存ストリームを停止する
      function stopCurrentStream() {
        if (currentStream) {
          try {
            currentStream.getTracks().forEach(track => {
              try { track.stop(); } catch (e) { console.warn('track.stop error', e); }
            });
          } catch (e) {
            console.warn('stopCurrentStream error', e);
          }
          currentStream = null;
        }
      }

      // ステータス更新
      function setStatus(state, message) {
        errorDiv.textContent = '';
        statusText.className = '';
        if (state === 'loading') {
          statusText.textContent = 'カメラ起動中';
          statusText.classList.add('loading');
        } else if (state === 'success') {
          statusText.textContent = message || 'カメラ起動成功';
          statusText.classList.add('success');
        } else if (state === 'failed') {
          statusText.textContent = 'カメラ起動失敗';
          statusText.classList.add('info');
          errorDiv.textContent = message || '不明なエラー';
        } else {
          statusText.textContent = message || 'カメラは未起動です';
          statusText.classList.add('info');
        }
      }

      // エラー表示（赤文字）
      function showError(message, e) {
        const msg = (message ? message + '\n' : '') + (e && e.message ? e.message : '');
        errorDiv.textContent = msg;
        console.error(message, e);
      }

      // getUserMedia の実行を行い、成功すれば video にセットする
      async function startCameraWithConstraints(constraints) {
        // 必ず event ハンドラ内から直接呼ばれることを想定しているため、
        // ここに追加のユーザー操作保証は不要（呼び出し側で制御）。
        try {
          const stream = await navigator.mediaDevices.getUserMedia(constraints);
          stopCurrentStream();
          currentStream = stream;
          video.srcObject = stream;

          // iOS Safari では user gesture 内で video.play() を呼ぶと良い
          try {
            await video.play();
          } catch (playError) {
            // 再生が自動でブロックされる場合があるが、音声は muted なので通常問題なし
            console.warn('video.play() failed:', playError);
          }
          return stream;
        } catch (err) {
          throw err;
        }
      }

      // ボタン押下で必ず呼ばれるメイン処理
      cameraButton.addEventListener('click', async function onCameraButtonClick(ev) {
        // 要件：ボタン押下イベント内で直接 getUserMedia を呼ぶ
        // （ここで async にして直接 await を呼び出す）
        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
          setStatus('failed');
          showError('このブラウザはカメラ API をサポートしていません。', new Error('navigator.mediaDevices.getUserMedia not available'));
          return;
        }

        setStatus('loading', 'カメラ起動中');
        errorDiv.textContent = '';
        console.log('カメラ起動試行: 背面優先');

        // 常に新規に取得するため既存ストリームは止める（切替ボタンの意図に合わせる）
        stopCurrentStream();

        // 1) 背面カメラを優先 (ideal: "environment")
        const envConstraints = { video: { facingMode: { ideal: "environment" } }, audio: false };
        // 2) 失敗したら前面カメラで再試行
        const userConstraints = { video: { facingMode: { ideal: "user" } }, audio: false };

        try {
          await startCameraWithConstraints(envConstraints);
          setStatus('success', 'カメラ起動成功（背面）');
          console.log('カメラ起動成功（背面）');
        } catch (errEnv) {
          console.warn('背面カメラで失敗:', errEnv);
          // If facingMode constraint fails (OverconstrainedError/NotFoundError/NotAllowedError etc) then try user-facing
          try {
            console.log('前面カメラで再試行');
            await startCameraWithConstraints(userConstraints);
            setStatus('success', 'カメラ起動成功（前面）');
            console.log('カメラ起動成功（前面）');
          } catch (errUser) {
            console.error('前面カメラでの再試行も失敗:', errUser);
            setStatus('failed');
            // 表示用のメッセージを詳細化
            let message = 'カメラの起動に失敗しました。';
            if (errUser && errUser.name) {
              message += ` エラー種別: ${errUser.name}`;
            }
            if (errUser && errUser.message) {
              message += `\n詳細: ${errUser.message}`;
            }
            showError(message, errUser);
          }
        }
      });

      // ページ離脱時にストリームを停止
      window.addEventListener('beforeunload', () => {
        stopCurrentStream();
      });

      // --- 既存のポカヨケ検査機能のサンプルハンドラ（実装を壊さないためプレースホルダ） ---
      document.getElementById('dummyInspectBtn').addEventListener('click', function () {
        alert('既存の検査処理をここで実行します（プレースホルダ）。');
      });
      // ------------------------------------------------------------------------------

    })();
  </script>
</body>
</html>

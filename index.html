<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ポカヨケ検査</title>
<style>
  :root {
    --bg:#0f1117;--panel:#1a1d27;--border:#2e3247;--ok:#00e676;--ok-dim:#00521f;--ng:#ff1744;--ng-dim:#5c0011;--warn:#ffc400;--text:#e8eaf0;--muted:#6b7280;--mono:'SF Mono','Fira Code','Courier New',monospace;--sans:-apple-system,'Hiragino Sans',sans-serif;--radius:12px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);overflow:hidden;overscroll-behavior:none}
  #app{display:flex;flex-direction:column;height:100dvh;gap:0}
  #statusbar{flex-shrink:0;display:flex;align-items:center;justify-content:space-between;padding:10px 16px 8px;background:var(--panel);border-bottom:1px solid var(--border);gap:8px}
  #statusbar h1{font-size:13px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--muted)}
  #score-display{font-family:var(--mono);font-size:13px;color:var(--warn);white-space:nowrap}
  #threshold-display{font-family:var(--mono);font-size:13px;color:var(--muted);white-space:nowrap}
  #camera-wrap{flex:1;position:relative;overflow:hidden;background:#000;min-height:0}
  #video{width:100%;height:100%;object-fit:cover;display:block}
  #roi-canvas{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:crosshair}
  #result-banner{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0;transition:opacity .08s}
  #result-banner.visible{opacity:1}
  #result-banner.ok{background:rgba(0,230,118,.18)}
  #result-banner.ng{background:rgba(255,23,68,.22)}
  #result-text{font-family:var(--mono);font-size:clamp(72px,20vw,140px);font-weight:900;letter-spacing:-.02em;line-height:1;transition:text-shadow .08s,color .08s}
  #result-text.ok{color:var(--ok);text-shadow:0 0 30px rgba(0,230,118,.8),0 0 60px rgba(0,230,118,.4)}
  #result-text.ng{color:var(--ng);text-shadow:0 0 30px rgba(255,23,68,.8),0 0 60px rgba(255,23,68,.4)}
  @keyframes flash{0%{opacity:1}30%{opacity:.3}60%{opacity:1}100%{opacity:1}}
  #result-text.flash{animation:flash .15s ease-out}
  #result-sub{position:absolute;bottom:12px;left:0;right:0;text-align:center;font-family:var(--mono);font-size:15px;pointer-events:none;opacity:0;transition:opacity .2s}
  #result-sub.visible{opacity:1}
  #result-sub.ok{color:var(--ok)}
  #result-sub.ng{color:var(--ng)}
  #ok-thumb-wrap{position:absolute;top:10px;right:10px;opacity:0;transition:opacity .3s;pointer-events:none}
  #ok-thumb-wrap.visible{opacity:1;pointer-events:auto}
  #ok-thumb-wrap label{display:block;font-size:10px;color:var(--ok);letter-spacing:.08em;margin-bottom:3px;text-align:center}
  #ok-thumb{display:block;width:80px;height:auto;border:1.5px solid var(--ok);border-radius:6px}
  #guide{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:10px;padding:20px}
  #guide-step{font-size:16px;font-weight:600;color:var(--warn);text-align:center;background:rgba(15,17,23,.75);padding:8px 16px;border-radius:8px;border:1px solid rgba(255,196,0,.3)}
  #guide-sub{font-size:13px;color:var(--muted);text-align:center;background:rgba(15,17,23,.6);padding:6px 14px;border-radius:6px}
  #controls{flex-shrink:0;background:var(--panel);border-top:1px solid var(--border);padding:10px 12px max(env(safe-area-inset-bottom,8px),8px);display:flex;flex-direction:column;gap:8px}
  #threshold-row{display:flex;align-items:center;gap:10px}
  #threshold-row label{font-size:11px;color:var(--muted);white-space:nowrap;flex-shrink:0}
  #threshold-slider{flex:1;-webkit-appearance:none;appearance:none;height:4px;background:var(--border);border-radius:2px;outline:none}
  #threshold-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--warn);cursor:pointer;box-shadow:0 0 8px rgba(255,196,0,.5)}
  #threshold-val{font-family:var(--mono);font-size:14px;color:var(--warn);width:28px;text-align:right;flex-shrink:0}
  #btn-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .btn{border:none;border-radius:var(--radius);padding:13px 6px;font-size:13px;font-weight:700;font-family:var(--sans);cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;transition:transform .1s,opacity .1s;-webkit-user-select:none}
  .btn:active{transform:scale(.94);opacity:.8}
  .btn-icon{font-size:20px;line-height:1}
  .btn-label{font-size:10px;letter-spacing:.06em;opacity:.85}
  #btn-roi{background:#1e2a3a;color:#64b5f6;border:1.5px solid #2a3f58}
  #btn-save{background:#1a2e1e;color:var(--ok);border:1.5px solid var(--ok-dim)}
  #btn-start{background:#1e1e1e;color:#ccc;border:1.5px solid var(--border)}
  #btn-start.running{background:var(--ng-dim);color:var(--ng);border-color:var(--ng)}
  #btn-log{background:#251e10;color:var(--warn);border:1.5px solid #3d2e00}
  #btn-reset{background:#1a1d27;color:var(--muted);border:1.5px solid var(--border)}
  #btn-cam{background:#1a1d27;color:#b39ddb;border:1.5px solid #2e2744}
  #toast{position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-10px);background:rgba(26,29,39,.95);color:var(--text);font-size:13px;padding:9px 18px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .2s,transform .2s;z-index:100;backdrop-filter:blur(8px)}
  #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  #error-screen{display:none;position:fixed;inset:0;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;padding:32px;gap:16px;z-index:200}
  #error-screen.visible{display:flex}
  #error-screen h2{font-size:20px;color:var(--ng);text-align:center}
  #error-screen p{font-size:14px;color:var(--muted);text-align:center;line-height:1.7}
  #btn-retry{background:var(--ng-dim);color:var(--ng);border:1.5px solid var(--ng);border-radius:10px;padding:12px 28px;font-size:15px;font-weight:700;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div id="statusbar">
    <h1>🔍 ポカヨケ検査</h1>
    <span id="score-display">スコア: --.-</span>
    <span id="threshold-display">閾値: 30</span>
  </div>
  <div id="camera-wrap">
    <video id="video" playsinline autoplay muted></video>
    <canvas id="roi-canvas"></canvas>
    <div id="result-banner"><div id="result-text"></div></div>
    <div id="result-sub"></div>
    <div id="ok-thumb-wrap"><label>OK基準</label><canvas id="ok-thumb"></canvas></div>
    <div id="guide">
      <div id="guide-step">① 検査範囲をドラッグで選択</div>
      <div id="guide-sub">画面上でドラッグして黄枠を描いてください</div>
    </div>
  </div>
  <div id="controls">
    <div id="threshold-row">
      <label>判定しきい値</label>
      <input type="range" id="threshold-slider" min="5" max="100" value="30" step="5">
      <span id="threshold-val">30</span>
    </div>
    <div id="btn-row">
      <button class="btn" id="btn-roi" onclick="resetROI()"><span class="btn-icon">⬜</span><span class="btn-label">範囲選択</span></button>
      <button class="btn" id="btn-save" onclick="saveOKImage()"><span class="btn-icon">📸</span><span class="btn-label">OK基準保存</span></button>
      <button class="btn" id="btn-start" onclick="toggleInspect()"><span class="btn-icon" id="start-icon">▶</span><span class="btn-label" id="start-label">検査開始</span></button>
      <button class="btn" id="btn-log" onclick="logResult()"><span class="btn-icon">💾</span><span class="btn-label">ログ記録</span></button>
      <button class="btn" id="btn-reset" onclick="resetAll()"><span class="btn-icon">↺</span><span class="btn-label">リセット</span></button>
      <button class="btn" id="btn-cam" onclick="switchCamera()"><span class="btn-icon">🔄</span><span class="btn-label">カメラ切替</span></button>
    </div>
  </div>
</div>
<div id="toast"></div>
<div id="error-screen">
  <h2>📷 カメラを使用できません</h2>
  <p>iPhoneの設定 → Safari → カメラ<br>を「許可」に変更してから<br>ページを再読み込みしてください。</p>
  <button id="btn-retry" onclick="location.reload()">再試行</button>
</div>
<canvas id="process-canvas" style="display:none"></canvas>
<script>
const state={roi:null,okImageData:null,result:null,diffScore:0,threshold:30,inspecting:false,logData:[],logCount:0,cameraFacing:'environment',lastResult:null};
const video=document.getElementById('video'),roiCanvas=document.getElementById('roi-canvas'),roiCtx=roiCanvas.getContext('2d'),procCanvas=document.getElementById('process-canvas'),procCtx=procCanvas.getContext('2d'),okThumb=document.getElementById('ok-thumb'),okThumbCtx=okThumb.getContext('2d'),okThumbWrap=document.getElementById('ok-thumb-wrap'),resultBanner=document.getElementById('result-banner'),resultText=document.getElementById('result-text'),resultSub=document.getElementById('result-sub'),guide=document.getElementById('guide'),guideStep=document.getElementById('guide-step'),guideSub=document.getElementById('guide-sub'),scoreDisp=document.getElementById('score-display'),threshDisp=document.getElementById('threshold-display'),toast=document.getElementById('toast'),errorScreen=document.getElementById('error-screen'),slider=document.getElementById('threshold-slider'),threshVal=document.getElementById('threshold-val');
async function startCamera(facing='environment'){if(video.srcObject)video.srcObject.getTracks().forEach(t=>t.stop());try{const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:facing},width:{ideal:1280},height:{ideal:720}},audio:false});video.srcObject=stream;state.cameraFacing=facing;await video.play();syncCanvasSize();showToast(facing==='environment'?'📷 背面カメラ起動':'🤳 前面カメラ起動')}catch(err){console.error('カメラエラー:',err);errorScreen.classList.add('visible')}}
function syncCanvasSize(){const w=video.videoWidth||video.clientWidth,h=video.videoHeight||video.clientHeight;roiCanvas.width=w;roiCanvas.height=h;procCanvas.width=w;procCanvas.height=h;roiCanvas.style.width='100%';roiCanvas.style.height='100%'}
function switchCamera(){startCamera(state.cameraFacing==='environment'?'user':'environment')}
let drag={active:false,sx:0,sy:0};
function getRelPos(e,canvas){const rect=canvas.getBoundingClientRect(),src=e.touches?e.touches[0]:e,scaleX=canvas.width/rect.width,scaleY=canvas.height/rect.height;return{x:(src.clientX-rect.left)*scaleX,y:(src.clientY-rect.top)*scaleY}}
function onDragStart(e){e.preventDefault();const pos=getRelPos(e,roiCanvas);drag.active=true;drag.sx=pos.x;drag.sy=pos.y;state.roi=null;state.okImageData=null;state.result=null;okThumbWrap.classList.remove('visible');updateResult(null)}
function onDragMove(e){if(!drag.active)return;e.preventDefault();const pos=getRelPos(e,roiCanvas);drawROIPreview(drag.sx,drag.sy,pos.x,pos.y)}
function onDragEnd(e){if(!drag.active)return;e.preventDefault();drag.active=false;const ex=e.changedTouches?e.changedTouches[0].clientX:e.clientX,ey=e.changedTouches?e.changedTouches[0].clientY:e.clientY,rect=roiCanvas.getBoundingClientRect(),scaleX=roiCanvas.width/rect.width,scaleY=roiCanvas.height/rect.height,endX=(ex-rect.left)*scaleX,endY=(ey-rect.top)*scaleY,x1=Math.min(drag.sx,endX),y1=Math.min(drag.sy,endY),x2=Math.max(drag.sx,endX),y2=Math.max(drag.sy,endY);if((x2-x1)<10||(y2-y1)<10){showToast('⚠️ もっと大きくドラッグしてください');drawROIClear();return}state.roi={x1,y1,x2,y2};drawROIFixed();updateGuide('step2');showToast('✅ 範囲確定 → OK基準を保存してください')}
roiCanvas.addEventListener('mousedown',onDragStart,{passive:false});roiCanvas.addEventListener('mousemove',onDragMove,{passive:false});roiCanvas.addEventListener('mouseup',onDragEnd,{passive:false});roiCanvas.addEventListener('touchstart',onDragStart,{passive:false});roiCanvas.addEventListener('touchmove',onDragMove,{passive:false});roiCanvas.addEventListener('touchend',onDragEnd,{passive:false});
function drawROIPreview(x1,y1,x2,y2){roiCtx.clearRect(0,0,roiCanvas.width,roiCanvas.height);roiCtx.fillStyle='rgba(0,0,0,0.35)';roiCtx.fillRect(0,0,roiCanvas.width,roiCanvas.height);roiCtx.clearRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1));roiCtx.strokeStyle='#ffd740';roiCtx.lineWidth=2;roiCtx.setLineDash([6,3]);roiCtx.strokeRect(Math.min(x1,x2),Math.min(y1,y2),Math.abs(x2-x1),Math.abs(y2-y1))}
function drawROIFixed(){const{x1,y1,x2,y2}=state.roi;roiCtx.clearRect(0,0,roiCanvas.width,roiCanvas.height);roiCtx.fillStyle='rgba(0,0,0,0.35)';roiCtx.fillRect(0,0,roiCanvas.width,roiCanvas.height);roiCtx.clearRect(x1,y1,x2-x1,y2-y1);roiCtx.strokeStyle='#ffd740';roiCtx.lineWidth=2.5;roiCtx.setLineDash([]);roiCtx.strokeRect(x1,y1,x2-x1,y2-y1);const cs=12;roiCtx.strokeStyle='#fff';roiCtx.lineWidth=3;[[x1,y1,x1+cs,y1,x1,y1+cs],[x2,y1,x2-cs,y1,x2,y1+cs],[x1,y2,x1+cs,y2,x1,y2-cs],[x2,y2,x2-cs,y2,x2,y2-cs]].forEach(([mx,my,lx1,ly1,lx2,ly2])=>{roiCtx.beginPath();roiCtx.moveTo(mx,my);roiCtx.lineTo(lx1,ly1);roiCtx.moveTo(mx,my);roiCtx.lineTo(lx2,ly2);roiCtx.stroke()});roiCtx.fillStyle='#ffd740';roiCtx.font='bold 11px -apple-system,sans-serif';roiCtx.fillText('ROI',x1+4,y1-5)}
function drawROIClear(){roiCtx.clearRect(0,0,roiCanvas.width,roiCanvas.height)}
function saveOKImage(){if(!state.roi){showToast('⚠️ 先に検査範囲を選択してください');return}const{x1,y1,x2,y2}=state.roi,w=x2-x1,h=y2-y1;procCtx.drawImage(video,0,0,procCanvas.width,procCanvas.height);state.okImageData=procCtx.getImageData(x1,y1,w,h);okThumb.width=w;okThumb.height=h;okThumbCtx.putImageData(state.okImageData,0,0);okThumbWrap.classList.add('visible');try{const tmpC=document.createElement('canvas');tmpC.width=w;tmpC.height=h;tmpC.getContext('2d').putImageData(state.okImageData,0,0);localStorage.setItem('okImage',tmpC.toDataURL('image/png'));localStorage.setItem('okROI',JSON.stringify(state.roi))}catch(e){}state.result=null;updateResult(null);updateGuide('step3');showToast('📸 OK基準を保存しました')}
function rgbaToGray(data){const gray=new Uint8Array(data.length/4);for(let i=0;i<gray.length;i++){const r=data[i*4],g=data[i*4+1],b=data[i*4+2];gray[i]=Math.round(.299*r+.587*g+.114*b)}return gray}
function calcDiffScore(a,b){let sum=0;const len=Math.min(a.length,b.length);for(let i=0;i<len;i++)sum+=Math.abs(a[i]-b[i]);return sum/len}
let inspectTimer=null;
function toggleInspect(){if(!state.roi){showToast('⚠️ 検査範囲を選択してください');return}if(!state.okImageData){showToast('⚠️ OK基準画像を保存してください');return}state.inspecting=!state.inspecting;const btn=document.getElementById('btn-start'),icon=document.getElementById('start-icon'),label=document.getElementById('start-label');if(state.inspecting){btn.classList.add('running');icon.textContent='⏹';label.textContent='検査停止';startInspectLoop();showToast('▶ 連続検査開始')}else{btn.classList.remove('running');icon.textContent='▶';label.textContent='検査開始';stopInspectLoop();showToast('⏹ 検査停止')}}
function startInspectLoop(){function tick(){if(!state.inspecting)return;runInspect();inspectTimer=requestAnimationFrame(tick)}inspectTimer=requestAnimationFrame(tick)}
function stopInspectLoop(){if(inspectTimer){cancelAnimationFrame(inspectTimer);inspectTimer=null}}
function runInspect(){if(!state.roi||!state.okImageData)return;const{x1,y1,x2,y2}=state.roi,w=x2-x1,h=y2-y1;procCtx.drawImage(video,0,0,procCanvas.width,procCanvas.height);const currentData=procCtx.getImageData(x1,y1,w,h),curGray=rgbaToGray(currentData.data),okGray=rgbaToGray(state.okImageData.data),score=calcDiffScore(curGray,okGray),result=score<=state.threshold?'OK':'NG';state.diffScore=score;state.result=result;updateResult(result,score);updateScoreDisplay(score)}
function updateResult(result,score){if(result===null){resultBanner.className='';resultBanner.classList.remove('visible');resultText.className='';resultText.textContent='';resultSub.classList.remove('visible');return}const isOK=result==='OK';if(result!==state.lastResult){resultText.classList.remove('flash');void resultText.offsetWidth;resultText.classList.add('flash');state.lastResult=result}resultBanner.className='visible '+(isOK?'ok':'ng');resultText.className=(isOK?'ok':'ng')+' flash';resultText.textContent=isOK?'OK':'NG';resultSub.className='visible '+(isOK?'ok':'ng');resultSub.textContent=`差分 ${score!==undefined?score.toFixed(1):'--'} ／ 閾値 ${state.threshold}`}
function updateScoreDisplay(score){scoreDisp.textContent=`スコア: ${score.toFixed(1)}`}
function updateGuide(step){const steps={step1:{main:'① 検査範囲をドラッグで選択',sub:'画面上でドラッグして黄枠を描いてください'},step2:{main:'② 合格品を置いて「OK基準保存」',sub:'合格状態のまま 📸 ボタンを押してください'},step3:{main:'③
